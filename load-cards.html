<!DOCTYPE html>
<html>
<head><title>Loading cards...</title></head>
<body style="background:#1a1a2e;color:#eee;font-family:Georgia;display:flex;align-items:center;justify-content:center;height:100vh;">
<h2>Loading 10 cards into Homemade SuperMemo...</h2>
<script>
var cards = JSON.parse(localStorage.getItem('sm2_flashcards') || '[]');
var today = new Date().toISOString().split('T')[0];
var newCards = [
  {front: 'What is anchoring?', back: 'The first number you hear pulls your estimate toward it, even if it is irrelevant.'},
  {front: 'What is the availability heuristic?', back: 'You judge how likely something is by how easily examples come to mind.'},
  {front: 'What is the representativeness heuristic?', back: 'You judge probability by how much something resembles a stereotype, ignoring base rates.'},
  {front: 'What is loss aversion?', back: 'Losses hurt about twice as much as equivalent gains feel good.'},
  {front: 'What is the halo effect?', back: 'Liking one quality of a person or thing makes you rate everything else about them positively too.'},
  {front: 'What is WYSIATI?', back: 'What You See Is All There Is. You build confident stories from only the information available, never asking what is missing.'},
  {front: 'What is substitution (in decision-making)?', back: 'When facing a hard question, your brain secretly swaps it for an easier one and answers that instead.'},
  {front: 'What is regression to the mean?', back: 'Extreme performances are naturally followed by more average ones. People invent false causal stories to explain this.'},
  {front: 'What is the framing effect?', back: 'How a choice is worded changes decisions, even when the options are mathematically identical.'},
  {front: 'What is overconfidence bias?', back: 'People systematically overestimate how much they know and how accurate their predictions are.'}
];
newCards.forEach(function(c) {
  cards.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    front: c.front,
    back: c.back,
    source: 'Thinking, Fast and Slow',
    chapter: '',
    tags: ['heuristics', 'biases'],
    ef: 2.5,
    interval: 0,
    repetitions: 0,
    dueDate: today,
    created: today,
    lastReviewed: null,
    totalReviews: 0
  });
});
localStorage.setItem('sm2_flashcards', JSON.stringify(cards));
window.location.href = 'index.html';
</script>
</body>
</html>
